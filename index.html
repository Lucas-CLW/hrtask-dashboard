<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人資專案管理面板 - 專業受控版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --bg2: #161a24; --bg3: #1e2335;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0; --text2: #8b92a8; --text3: #545d78;
  --blue: #4a9eff; --blue-bg: rgba(74,158,255,0.10);
  --red: #f0524f; --red-bg: rgba(240,82,79,0.12);
  --teal: #2ec4a9; --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--blue), var(--teal)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

/* 權限控制開關 */
.auth-panel { display: flex; align-items: center; gap: 10px; background: var(--bg3); padding: 5px 15px; border-radius: var(--radius-sm); border: 1px solid var(--border2); }
.status-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.status-active { background: var(--teal); box-shadow: 0 0 8px var(--teal); }

/* TEAM SECTION */
.team-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 2rem; display: flex; align-items: center; gap: 15px; }
.team-list { display: flex; gap: 8px; flex-wrap: wrap; }
.team-pill { padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 15px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
.remove-btn { cursor: pointer; color: var(--text3); }
.remove-btn:hover { color: var(--red); }

/* 原有元件樣式簡化... (同你原始檔案) */
.btn { padding: 6px 14px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; transition: 0.2s; }
.btn-blue { background: var(--blue); color: white; }
.btn-disabled { background: var(--text3); cursor: not-allowed; opacity: 0.5; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-content { background: var(--bg2); padding: 25px; border-radius: var(--radius); width: 450px; border: 1px solid var(--border2); }
.form-group { margin-bottom: 15px; }
.form-label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
.form-control { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; }

/* 搜尋與篩選 (略...) */
.filter-bar { padding: 10px 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
.board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; }
.column { min-width: 300px; background: rgba(255,255,255,0.02); border-radius: var(--radius); padding: 15px; }
.task-card { background: var(--bg3); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-icon">HR</div>
    <div>
      <div class="logo-title">專案控管儀表板</div>
      <div class="logo-sub">Internal Use Only</div>
    </div>
  </div>
  
  <div class="auth-panel">
    <div id="authStatusIcon" class="status-indicator"></div>
    <span id="authStatusText" style="font-size: 12px; color: var(--text2);">唯讀模式</span>
    <button id="authBtn" class="btn btn-blue" style="padding: 3px 10px; font-size: 11px;" onclick="handleAuth()">解鎖編輯</button>
  </div>

  <button class="btn btn-blue edit-required btn-disabled" id="addTaskBtn" onclick="openModal()" disabled>+ 新增任務</button>
</div>

<div class="team-bar">
  <span style="font-size: 12px; color: var(--text3);">團隊成員：</span>
  <div id="teamContainer" class="team-list"></div>
  <div class="edit-required" style="display:none; margin-left:10px;">
    <input type="text" id="newMemberName" placeholder="姓名" style="background:var(--bg3); border:1px solid var(--border); color:white; padding:3px 8px; border-radius:4px; font-size:12px; width:80px;">
    <button class="btn btn-blue" style="padding: 3px 8px; font-size: 11px;" onclick="addMember()">新增</button>
  </div>
</div>

<div class="filter-bar" id="assigneeFilters">
  </div>

<div class="board" id="board">
  </div>

<div class="modal" id="taskModal">
  <div class="modal-content">
    <h3 id="modalTitle">新增任務</h3><br>
    <div class="form-group">
      <label class="form-label">任務名稱</label>
      <input type="text" id="fTitle" class="form-control">
    </div>
    <div class="form-group">
      <label class="form-label">負責人 (下拉選擇)</label>
      <select id="fAssignee" class="form-control"></select>
    </div>
    <div class="form-group">
      <label class="form-label">進度狀態</label>
      <select id="fStatus" class="form-control">
        <option value="待處理">待處理</option>
        <option value="進行中">進行中</option>
        <option value="已完成">已完成</option>
      </select>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button class="btn" onclick="closeModal()" style="background:var(--bg3); color:white;">取消</button>
      <button class="btn btn-blue" onclick="saveTask()">儲存任務</button>
    </div>
  </div>
</div>

<script>
// 初始化資料
let tasks = JSON.parse(localStorage.getItem('hr_tasks') || '[]');
let members = JSON.parse(localStorage.getItem('hr_members') || '["張經理", "林專員"]');
let isAuthorized = false;
const ADMIN_PASSWORD = "hr888"; // 這裡可以修改你的簡易管理密碼

// ─── 權限管理 ───
function handleAuth() {
  if (!isAuthorized) {
    const pwd = prompt("請輸入管理員密碼以啟用編輯功能：");
    if (pwd === ADMIN_PASSWORD) {
      isAuthorized = true;
      document.getElementById('authStatusIcon').classList.add('status-active');
      document.getElementById('authStatusText').textContent = "管理員模式";
      document.getElementById('authBtn').textContent = "鎖定";
      enableEditing(true);
    } else {
      alert("密碼錯誤！");
    }
  } else {
    isAuthorized = false;
    document.getElementById('authStatusIcon').classList.remove('status-active');
    document.getElementById('authStatusText').textContent = "唯讀模式";
    document.getElementById('authBtn').textContent = "解鎖編輯";
    enableEditing(false);
  }
}

function enableEditing(enabled) {
  const editElements = document.querySelectorAll('.edit-required');
  const addTaskBtn = document.getElementById('addTaskBtn');
  
  addTaskBtn.disabled = !enabled;
  if(enabled) addTaskBtn.classList.remove('btn-disabled');
  else addTaskBtn.classList.add('btn-disabled');

  editElements.forEach(el => {
    el.style.display = enabled ? 'block' : (el.tagName === 'BUTTON' ? 'none' : el.style.display);
  });
  renderAll();
}

// ─── 成員管理 ───
function renderMembers() {
  const container = document.getElementById('teamContainer');
  container.innerHTML = members.map(m => `
    <div class="team-pill">
      ${m}
      ${isAuthorized ? `<span class="remove-btn" onclick="removeMember('${m}')">×</span>` : ''}
    </div>
  `).join('');
  
  // 同步更新任務視窗的下拉選單
  const select = document.getElementById('fAssignee');
  select.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
}

function addMember() {
  const name = document.getElementById('newMemberName').value.trim();
  if (name && !members.includes(name)) {
    members.push(name);
    localStorage.setItem('hr_members', JSON.stringify(members));
    document.getElementById('newMemberName').value = '';
    renderAll();
  }
}

function removeMember(name) {
  if (confirm(`確定移除 ${name}？`)) {
    members = members.filter(m => m !== name);
    localStorage.setItem('hr_members', JSON.stringify(members));
    renderAll();
  }
}

// ─── 任務管理 ───
function renderAll() {
  renderMembers();
  const board = document.getElementById('board');
  const statuses = ['待處理', '進行中', '已完成'];
  
  board.innerHTML = statuses.map(status => {
    const filtered = tasks.filter(t => t.status === status);
    return `
      <div class="column">
        <h4 style="margin-bottom:15px; color:var(--text3)">${status} (${filtered.length})</h4>
        ${filtered.map(t => `
          <div class="task-card">
            <div style="font-weight:500; margin-bottom:8px;">${t.title}</div>
            <div style="font-size:11px; color:var(--blue)">👤 ${t.assignee}</div>
            ${isAuthorized ? `<button onclick="deleteTask(${t.id})" style="background:none; border:none; color:var(--red); font-size:10px; cursor:pointer; margin-top:10px;">刪除</button>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function openModal() { document.getElementById('taskModal').style.display = 'flex'; }
function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

function saveTask() {
  const newTask = {
    id: Date.now(),
    title: document.getElementById('fTitle').value,
    assignee: document.getElementById('fAssignee').value,
    status: document.getElementById('fStatus').value
  };
  tasks.push(newTask);
  localStorage.setItem('hr_tasks', JSON.stringify(tasks));
  closeModal();
  renderAll();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem('hr_tasks', JSON.stringify(tasks));
  renderAll();
}

// 初始執行
renderAll();
</script>
</body>
</html>
