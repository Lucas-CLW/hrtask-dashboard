<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人資專案管理面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161a24;
  --bg3: #1e2335;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8b92a8;
  --text3: #545d78;
  --red: #f0524f;
  --red-bg: rgba(240,82,79,0.12);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.12);
  --blue: #4a9eff;
  --blue-bg: rgba(74,158,255,0.10);
  --teal: #2ec4a9;
  --teal-bg: rgba(46,196,169,0.10);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.10);
  --gray-bg: rgba(139,146,168,0.10);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.10);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 300;
  margin-top: 1px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-add {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity .15s;
}
.btn-add:hover { opacity: .85; }
.btn-add svg { width: 14px; height: 14px; }

/* FILTERS */
.filter-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 2rem;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  transition: all .15s;
  font-family: inherit;
}
.pill:hover { border-color: var(--blue); color: var(--blue); }
.pill.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.filter-sep { width: 1px; height: 20px; background: var(--border); }
.search-wrap {
  margin-left: auto;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  width: 14px; height: 14px;
}
.search-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px 6px 32px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  width: 200px;
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text3); }

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--bg2);
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  font-family: 'DM Mono', monospace;
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.stat-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .5s ease;
}

/* PROGRESS */
.progress-section {
  padding: 12px 2rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--teal));
  border-radius: 3px;
  transition: width .5s ease;
}
.progress-text {
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}

/* WORKLOAD SECTION */
.workload-section {
  padding: 15px 2rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 15px;
  overflow-x: auto;
}
.workload-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  writing-mode: vertical-lr; /* 移除了會導致顛倒的 transform 屬性 */
  text-align: center;
  letter-spacing: 0.2em;
}
.workload-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  min-width: 150px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.wl-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.wl-name { font-size: 13px; font-weight: 600; color: var(--text); }
.wl-pt { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--purple); font-weight: 700; }
.wl-bar-bg {
  height: 4px;
  background: rgba(167,139,250,0.15);
  border-radius: 2px;
  overflow: hidden;
}
.wl-bar-fill {
  height: 100%;
  background: var(--purple);
  border-radius: 2px;
  transition: width 0.5s ease;
}
.wl-details {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text2);
}

/* BOARD */
.board-wrap {
  padding: 20px;
  overflow-x: auto;
}
.board {
  display: flex;
  gap: 16px;
  min-width: fit-content;
}
.column {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.col-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-title {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
}
.col-count {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
}
.col-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 100px;
  padding: 4px 0;
}
.col-body.drag-over {
  outline: 2px dashed var(--blue);
  outline-offset: 4px;
  border-radius: var(--radius);
  background: var(--blue-bg);
}

/* TASK CARD WARNING ANIMATION */
@keyframes pulseGlow {
  0%   { box-shadow: 0 0 0 0 rgba(245,166,35,0.5); border-color: var(--border); }
  50%  { box-shadow: 0 0 10px 1px rgba(245,166,35,0.3); border-color: var(--amber); }
  100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); border-color: var(--border); }
}

.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  position: relative;
  overflow: hidden;
}
.task-card.draggable {
  cursor: grab;
}
.task-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  transform: translateY(-1px);
}
.task-card.dragging {
  opacity: .5;
  transform: rotate(2deg);
  cursor: grabbing;
}
/* 倒數3天內的光暈效果 */
.task-card.nearing-deadline {
  animation: pulseGlow 2.5s infinite;
}
/* 已延宕的紅框與微紅底色 */
.task-card.overdue-deadline {
  border: 1px solid var(--red);
  background: rgba(240,82,79,0.06);
}

.task-card-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.task-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-top: 4px;
}
.task-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  flex: 1;
}
.task-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
}
.task-card:hover .task-actions { opacity: 1; }
.task-btn {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: none;
  background: var(--bg3);
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.task-btn:hover { color: var(--text); background: var(--border2); }
.task-btn.del:hover { color: var(--red); }
.task-btn svg { width: 12px; height: 12px; }
.task-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .03em;
}
.badge-status { border-radius: 20px; font-size: 11px; }
.task-assignee {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text2);
}
.avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 600;
}
.task-notes {
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.complexity-dots {
  display: flex;
  gap: 3px;
  margin-left: auto;
}
.cdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border2);
}
.cdot.on { background: var(--text2); }
.task-deadline {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}

/* STATUS COLORS */
.status-pending { background: var(--gray-bg); color: var(--text2); }
.status-doing   { background: var(--blue-bg); color: var(--blue); }
.status-done    { background: var(--green-bg); color: var(--green); }
.status-overdue { background: var(--red-bg); color: var(--red); }

/* URGENCY */
.urgent-red    { background: var(--red); }
.urgent-amber  { background: var(--amber); }
.urgent-blue   { background: var(--blue); }
.urgent-teal   { background: var(--teal); }
.urgent-purple { background: var(--purple); }

.deadline-red   { color: var(--red); }
.deadline-amber { color: var(--amber); }
.deadline-blue  { color: var(--blue); }
.deadline-teal  { color: var(--teal); }
.deadline-gray  { color: var(--text3); }

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 500px;
  padding: 28px;
  animation: slideUp .2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  transition: color .15s;
}
.modal-close:hover { color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.form-control {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.form-control:focus { border-color: var(--blue); }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }
.btn-save {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
}
.btn-save:hover { opacity: .85; }

/* EMPTY */
.col-empty {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  padding: 20px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  transform: translateY(10px);
  opacity: 0;
  transition: all .2s;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .filter-bar { padding: 10px 1rem; }
  .board-wrap { padding: 12px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="logo-icon">📋</div>
    <div>
      <div class="logo-title">人資專案管理面板</div>
      <div class="logo-sub">HR Project Management Dashboard</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-add" id="authBtn" style="background:var(--bg3); border:1px solid var(--border); color:var(--text);" onclick="toggleAuth()">
      🔒 唯讀模式
    </button>
    <button class="btn-add" id="addTaskBtn" style="display:none;" onclick="openModal()">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"/></svg>
      新增任務
    </button>
  </div>
</header>

<div class="stats-row" id="statsRow">
  <div class="stat-card">
    <div class="stat-num" id="statTotal" style="color:var(--text)">0</div>
    <div class="stat-label">全部任務</div>
    <div class="stat-bar"><div class="stat-fill" id="barTotal" style="background:var(--blue);width:100%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statDone" style="color:var(--green)">0</div>
    <div class="stat-label">已完成</div>
    <div class="stat-bar"><div class="stat-fill" id="barDone" style="background:var(--green);width:0%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statDoing" style="color:var(--blue)">0</div>
    <div class="stat-label">進行中</div>
    <div class="stat-bar"><div class="stat-fill" id="barDoing" style="background:var(--blue);width:0%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statPending" style="color:var(--text2)">0</div>
    <div class="stat-label">待處理</div>
    <div class="stat-bar"><div class="stat-fill" id="barPending" style="background:var(--text3);width:0%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statOverdue" style="color:var(--red)">0</div>
    <div class="stat-label">已延宕</div>
    <div class="stat-bar"><div class="stat-fill" id="barOverdue" style="background:var(--red);width:0%"></div></div>
  </div>
</div>

<div class="progress-section">
  <span style="font-size:12px;color:var(--text3)">整體進度</span>
  <div class="progress-bar-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span class="progress-text" id="progressText">0 / 0</span>
</div>

<div class="workload-section" id="workloadSection">
  </div>

<div class="filter-bar" id="teamBar" style="display:none; border-bottom: 1px solid var(--border); background:var(--bg3);">
  <span class="filter-label" style="color:var(--teal);">團隊管理</span>
  <div class="filter-pills" id="teamList"></div>
  <div class="search-wrap" style="display:flex; align-items:center;">
    <input class="search-input" style="padding-left:12px; width:120px;" type="text" id="newMemberInput" placeholder="輸入成員姓名...">
    <button class="btn-add" style="padding:4px 12px; font-size:12px; margin-left:8px;" onclick="addMember()">新增成員</button>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">狀態</span>
  <div class="filter-pills" id="statusFilters">
    <button class="pill active" data-group="status" data-val="all" onclick="setFilter('status','all',this)">全部</button>
    <button class="pill" data-group="status" data-val="待處理" onclick="setFilter('status','待處理',this)">待處理</button>
    <button class="pill" data-group="status" data-val="進行中" onclick="setFilter('status','進行中',this)">進行中</button>
    <button class="pill" data-group="status" data-val="已完成" onclick="setFilter('status','已完成',this)">已完成</button>
  </div>
  <div class="filter-sep"></div>
  <span class="filter-label">複雜度</span>
  <div class="filter-pills">
    <button class="pill active" data-group="complexity" data-val="all" onclick="setFilter('complexity','all',this)">全部</button>
    <button class="pill" data-group="complexity" data-val="1" onclick="setFilter('complexity','1',this)">● 低</button>
    <button class="pill" data-group="complexity" data-val="2" onclick="setFilter('complexity','2',this)">●● 中</button>
    <button class="pill" data-group="complexity" data-val="3" onclick="setFilter('complexity','3',this)">●●● 高</button>
  </div>
  <div class="filter-sep"></div>
  <span class="filter-label">負責人</span>
  <div class="filter-pills" id="assigneeFilters">
    <button class="pill active" data-group="assignee" data-val="all" onclick="setFilter('assignee','all',this)">全部</button>
  </div>
  
  <div class="filter-sep"></div>
  <span class="filter-label">排序</span>
  <select class="search-input" id="sortSelect" style="width: auto; padding: 4px 10px; font-size: 12px;" onchange="renderAll()">
    <option value="default">預設順序</option>
    <option value="deadlineAsc">截止日 (近 &rarr; 遠)</option>
    <option value="complexityDesc">複雜度 (高 &rarr; 低)</option>
  </select>

  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.868-3.834zm-5.242 1.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
    <input class="search-input" style="padding-left: 32px;" type="text" placeholder="搜尋任務..." id="searchInput" oninput="renderAll()">
  </div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">新增任務</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">任務名稱 *</label>
      <input class="form-control" id="fName" type="text" placeholder="輸入任務名稱">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">截止時間</label>
        <input class="form-control" id="fDeadline" type="date" placeholder="e.g. 2026-04-30">
      </div>
      <div class="form-group">
        <label class="form-label">負責人</label>
        <select class="form-control" id="fAssignee"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">優先分類</label>
        <select class="form-control" id="fColumn">
          <option value="urgent">🔴 緊急（今日）</option>
          <option value="week">🟠 本週內</option>
          <option value="month">🔵 本月底前</option>
          <option value="longterm">🟢 長期</option>
          <option value="strategic">⚪ 策略性任務</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">複雜度</label>
        <select class="form-control" id="fComplexity">
          <option value="1">● 低</option>
          <option value="2">●● 中</option>
          <option value="3">●●● 高</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">狀態</label>
        <select class="form-control" id="fStatus">
          <option value="待處理">待處理</option>
          <option value="進行中">進行中</option>
          <option value="已完成">已完成</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備註 / 重點</label>
      <textarea class="form-control" id="fNotes" placeholder="輸入重點事項、備忘..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveTask()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── INIT & NORMALIZE DATA ───────────────────────────────────────────────────
const COLUMNS = [
  { id: 'urgent',   label: '🔴 緊急', dot: 'urgent-red',    accent: '#f0524f' },
  { id: 'week',     label: '🟠 本週',  dot: 'urgent-amber',  accent: '#f5a623' },
  { id: 'month',    label: '🔵 本月',  dot: 'urgent-blue',   accent: '#4a9eff' },
  { id: 'longterm', label: '🟢 長期',  dot: 'urgent-teal',   accent: '#2ec4a9' },
  { id: 'strategic',label: '⚪ 策略',  dot: 'urgent-purple', accent: '#a78bfa' },
];

const DEFAULT_TASKS = [
  {id:1,  name:"蘇健銘晉升調薪案",         deadline:"2026-04-13", assignee:"淑圓",  complexity:2, status:"進行中", column:"urgent",    notes:"公告稿、晉升核決權限表、薪資調整表、簽呈、人事通告"},
  {id:2,  name:"ISO 公告",                 deadline:"2026-04-10", assignee:"淑圓",  complexity:1, status:"已完成", column:"urgent",    notes:"公告稿，4/10下午送簽"},
  {id:3,  name:"陳勳振晉升調薪案",         deadline:"2026-04-16", assignee:"淑圓",  complexity:2, status:"進行中", column:"week",      notes:"公告稿、晉升核決權限表、薪資調整表、簽呈、人事通告"},
  {id:4,  name:"陳清泰、葉順興調薪案",     deadline:"2026-04-15", assignee:"淑圓",  complexity:2, status:"待處理", column:"week",      notes:"4/15前送簽 → 4/30薪酬委員會 → 5/11董事會"},
  {id:5,  name:"蘇州永光董事長任命案",     deadline:"2026-04-15", assignee:"淑圓",  complexity:3, status:"待處理", column:"week",      notes:"4/15前送簽 → 4/30提名+薪酬委員會 → 5/11董事會，需評估重訊"},
];

let tasks = [];
try {
  const rawTasks = localStorage.getItem('hr_tasks');
  const parsed = JSON.parse(rawTasks);
  if (Array.isArray(parsed)) {
    tasks = parsed.map(t => ({
      ...t,
      name: t.name || t.title || '未命名任務',
      notes: t.notes || ''
    }));
  } else {
    tasks = DEFAULT_TASKS;
  }
} catch(e) {
  tasks = DEFAULT_TASKS;
}

let teamMembers = [];
try {
  const rawMembers = localStorage.getItem('hr_team_members');
  const parsedMembers = JSON.parse(rawMembers);
  if (Array.isArray(parsedMembers)) {
    teamMembers = parsedMembers;
  } else {
    teamMembers = ["淑圓", "Lucas", "景雲", "佳怡"];
  }
} catch(e) {
  teamMembers = ["淑圓", "Lucas", "景雲", "佳怡"];
}

let nextId = tasks.length > 0 ? Math.max(...tasks.map(t=>t.id)) + 1 : 1;
let editingId = null;
let filters = { status: 'all', complexity: 'all', assignee: 'all' };
let dragId = null;
let isAuthorized = false;
const ADMIN_PWD = "hr";

function save() {
  localStorage.setItem('hr_tasks', JSON.stringify(tasks));
}

// ─── AUTH & TEAM ─────────────────────────────────────────────────────────────
function toggleAuth() {
  if (!isAuthorized) {
    const pwd = prompt("請輸入管理員密碼：");
    if (pwd === ADMIN_PWD) {
      isAuthorized = true;
    }
  } else {
    isAuthorized = false;
  }
  updateAuthUI();
}

function updateAuthUI() {
  const authBtn = document.getElementById('authBtn');
  const addBtn = document.getElementById('addTaskBtn');
  const teamBar = document.getElementById('teamBar');
  
  if (isAuthorized) {
    authBtn.innerHTML = '🔓 管理模式';
    authBtn.style.background = 'var(--teal)';
    authBtn.style.borderColor = 'var(--teal)';
    addBtn.style.display = 'flex';
    teamBar.style.display = 'flex';
  } else {
    authBtn.innerHTML = '🔒 唯讀模式';
    authBtn.style.background = 'var(--bg3)';
    authBtn.style.borderColor = 'var(--border)';
    addBtn.style.display = 'none';
    teamBar.style.display = 'none';
  }
  renderAll();
}

function renderTeam() {
  const list = document.getElementById('teamList');
  list.innerHTML = teamMembers.map(m => 
    `<span class="pill" style="border-color:var(--teal); color:var(--text);">${m} 
      <span style="cursor:pointer; opacity:.5; margin-left:6px; font-weight:bold;" onclick="removeMember('${m}')" title="刪除">×</span>
    </span>`
  ).join('');

  const sel = document.getElementById('fAssignee');
  if (sel) {
      const curVal = sel.value;
      sel.innerHTML = `<option value="">請選擇負責人...</option>` + 
                      teamMembers.map(m => `<option value="${m}">${m}</option>`).join('');
      sel.value = curVal;
  }
}

function addMember() {
  const input = document.getElementById('newMemberInput');
  const name = input.value.trim();
  if (name && !teamMembers.includes(name)) {
    teamMembers.push(name);
    localStorage.setItem('hr_team_members', JSON.stringify(teamMembers));
    input.value = '';
    renderAll();
  }
}

function removeMember(name) {
  if (confirm(`確定從團隊中移除「${name}」？\n(注意：不會刪除已指派給他的舊任務)`)) {
    teamMembers = teamMembers.filter(m => m !== name);
    localStorage.setItem('hr_team_members', JSON.stringify(teamMembers));
    renderAll();
  }
}

// ─── FILTERS & SORTING ───────────────────────────────────────────────────────
function setFilter(group, val, btn) {
  filters[group] = val;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return tasks.filter(t => {
    if (filters.status !== 'all' && t.status !== filters.status) return false;
    if (filters.complexity !== 'all' && String(t.complexity) !== filters.complexity) return false;
    if (filters.assignee !== 'all' && t.assignee !== filters.assignee) return false;
    if (q) {
      const nameMatch = (t.name || '').toLowerCase().includes(q);
      const notesMatch = (t.notes || '').toLowerCase().includes(q);
      if (!nameMatch && !notesMatch) return false;
    }
    return true;
  });
}

function getSorted(tasksArray) {
  const sortSelect = document.getElementById('sortSelect');
  const sortType = sortSelect ? sortSelect.value : 'default';
  let sorted = [...tasksArray];

  if (sortType === 'deadlineAsc') {
    sorted.sort((a, b) => {
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return new Date(a.deadline) - new Date(b.deadline);
    });
  } else if (sortType === 'complexityDesc') {
    sorted.sort((a, b) => (b.complexity || 0) - (a.complexity || 0));
  } else {
    sorted.sort((a, b) => a.id - b.id);
  }
  return sorted;
}

function updateAssigneeFilters() {
  const assignees = [...new Set([...teamMembers, ...tasks.map(t=>t.assignee).filter(Boolean)])].sort();
  const wrap = document.getElementById('assigneeFilters');
  const cur = filters.assignee;
  wrap.innerHTML = `<button class="pill ${cur==='all'?'active':''}" data-group="assignee" data-val="all" onclick="setFilter('assignee','all',this)">全部</button>`;
  assignees.forEach(a => {
    wrap.innerHTML += `<button class="pill ${cur===a?'active':''}" data-group="assignee" data-val="${a}" onclick="setFilter('assignee','${a}',this)">${a}</button>`;
  });
}

// ─── WORKLOAD CALCULATION ────────────────────────────────────────────────────
function updateWorkload() {
  const container = document.getElementById('workloadSection');
  if (!container) return;

  const activeTasks = tasks.filter(t => t.status !== '已完成');
  const loadMap = {};
  
  teamMembers.forEach(m => loadMap[m] = { count: 0, complexity: 0 });
  loadMap['未指派'] = { count: 0, complexity: 0 };

  let maxComplexity = 1;

  activeTasks.forEach(t => {
    const assignee = (t.assignee && teamMembers.includes(t.assignee)) ? t.assignee : (t.assignee ? t.assignee : '未指派');
    if (!loadMap[assignee]) loadMap[assignee] = { count: 0, complexity: 0 };
    loadMap[assignee].count += 1;
    loadMap[assignee].complexity += (Number(t.complexity) || 1);
  });

  Object.keys(loadMap).forEach(k => {
    if (loadMap[k].complexity > maxComplexity) maxComplexity = loadMap[k].complexity;
  });

  let html = `<span class="workload-label">負荷評估</span>`;
  
  Object.keys(loadMap).forEach(m => {
    if (m === '未指派' && loadMap[m].count === 0) return;
    
    const data = loadMap[m];
    const baseline = Math.max(maxComplexity, 10); // 以10為基礎基準點防止比例失真
    const pct = Math.min((data.complexity / baseline) * 100, 100);
    
    html += `
      <div class="workload-card">
        <div class="wl-head">
          <span class="wl-name">${m}</span>
          <span class="wl-pt">${data.complexity} pt</span>
        </div>
        <div class="wl-bar-bg"><div class="wl-bar-fill" style="width:${pct}%"></div></div>
        <div class="wl-details">
          <span>未完成任務</span>
          <span>${data.count} 件</span>
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const total = tasks.length;
  const done  = tasks.filter(t=>t.status==='已完成').length;
  const doing = tasks.filter(t=>t.status==='進行中').length;
  const pending = tasks.filter(t=>t.status==='待處理').length;
  
  let overdue = 0;
  const today = new Date(); 
  today.setHours(0,0,0,0);
  
  tasks.forEach(t => {
    if (t.status !== '已完成' && t.deadline) {
      const taskDate = new Date(t.deadline);
      if (!isNaN(taskDate.getTime())) {
        taskDate.setHours(0,0,0,0);
        const diffDays = Math.round((taskDate - today) / (1000*60*60*24));
        if (diffDays < 0) {
          overdue++;
        }
      }
    }
  });

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statDone').textContent    = done;
  document.getElementById('statDoing').textContent   = doing;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statOverdue').textContent = overdue;
  
  document.getElementById('barDone').style.width    = total ? (done/total*100)+'%' : '0%';
  document.getElementById('barDoing').style.width   = total ? (doing/total*100)+'%' : '0%';
  document.getElementById('barPending').style.width = total ? (pending/total*100)+'%' : '0%';
  document.getElementById('barOverdue').style.width = total ? (overdue/total*100)+'%' : '0%';
  
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';
  document.getElementById('progressText').textContent = `${done} / ${total} 完成`;
}

// ─── CARD ────────────────────────────────────────────────────────────────────
function getDeadlineColor(dl) {
  if (!dl) return 'deadline-gray';
  const d = new Date(dl);
  if (isNaN(d.getTime())) return 'deadline-gray';
  
  const today = new Date(); 
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  
  const diffDays = Math.round((d - today) / (1000*60*60*24));
  if (diffDays < 0)  return 'deadline-red';
  if (diffDays <= 2) return 'deadline-red';
  if (diffDays <= 7) return 'deadline-amber';
  if (diffDays <= 30)return 'deadline-blue';
  return 'deadline-teal';
}

function statusClass(s) {
  if (s==='已完成') return 'status-done';
  if (s==='進行中') return 'status-doing';
  return 'status-pending';
}

function avatarColor(name) {
  const colors = ['#4a9eff','#2ec4a9','#f5a623','#a78bfa','#f0524f','#4ade80'];
  const idx = (name.charCodeAt(0) || 0) % colors.length;
  return colors[idx];
}

function renderCard(t) {
  const col = COLUMNS.find(c=>c.id===t.column);
  const dots = [1,2,3].map(i=>`<span class="cdot${i<=t.complexity?' on':''}"></span>`).join('');
  const dlColor = getDeadlineColor(t.deadline);
  const dlText  = t.deadline || '—';
  const avc = t.assignee ? avatarColor(t.assignee) : '#545d78';
  const avTxt = t.assignee ? t.assignee[0] : '';
  const dragClass = isAuthorized ? 'draggable' : '';
  
  let cardStatusClass = '';
  if (t.status !== '已完成' && t.deadline) {
    const taskDate = new Date(t.deadline);
    if (!isNaN(taskDate.getTime())) {
      const today = new Date(); 
      today.setHours(0,0,0,0);
      taskDate.setHours(0,0,0,0);
      const diffDays = Math.round((taskDate - today) / (1000*60*60*24));
      
      if (diffDays < 0) {
        cardStatusClass = 'overdue-deadline';
      } else if (diffDays >= 0 && diffDays <= 3) {
        cardStatusClass = 'nearing-deadline';
      }
    }
  }
  
  const actionButtons = isAuthorized ? `
    <div class="task-actions">
      <button class="task-btn" onclick="openModal(${t.id})" title="編輯">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61zm.176 4.823L9.75 4.81l-6.286 6.287a.253.253 0 0 0-.064.108l-.558 1.953 1.953-.558a.253.253 0 0 0 .108-.064zm1.238-3.763a.25.25 0 0 0-.354 0L10.811 3.65l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354z"/></svg>
      </button>
      <button class="task-btn del" onclick="deleteTask(${t.id})" title="刪除">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.575l-.66-6.6a.75.75 0 1 1 1.492-.15ZM6.5 1.75V3h3V1.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25Z"/></svg>
      </button>
    </div>` : '';

  return `
  <div class="task-card ${dragClass} ${cardStatusClass}" draggable="${isAuthorized ? 'true' : 'false'}"
       ondragstart="${isAuthorized ? `dragStart(event,${t.id})` : ''}"
       ondragend="${isAuthorized ? 'dragEnd(event)' : ''}"
       id="card-${t.id}">
    <div class="task-card-accent" style="background:${col?col.accent:'#555'}"></div>
    <div class="task-top">
      <div class="task-name">${t.name}</div>
      ${actionButtons}
    </div>
    <div class="task-meta">
      <span class="badge badge-status ${statusClass(t.status)}">${t.status}</span>
      ${t.deadline ? `<span class="task-deadline ${dlColor}">${dlText}</span>` : ''}
      ${t.assignee ? `<span class="task-assignee"><span class="avatar" style="background:${avc}22;color:${avc}">${avTxt}</span>${t.assignee}</span>` : ''}
      <div class="complexity-dots">${dots}</div>
    </div>
    ${t.notes ? `<div class="task-notes">${t.notes}</div>` : ''}
  </div>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  renderTeam(); 
  updateStats();
  updateWorkload();
  updateAssigneeFilters();
  
  const filtered = getFiltered();
  const sortedFiltered = getSorted(filtered); 

  const board = document.getElementById('board');
  board.innerHTML = '';
  COLUMNS.forEach(col => {
    const colTasks = sortedFiltered.filter(t=>t.column===col.id);
    const div = document.createElement('div');
    div.className = 'column';
    div.innerHTML = `
      <div class="col-header">
        <span class="col-dot ${col.dot}"></span>
        <span class="col-title">${col.label}</span>
        <span class="col-count">${colTasks.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}"
           ondragover="${isAuthorized ? `dragOver(event,'${col.id}')` : ''}"
           ondragleave="${isAuthorized ? 'dragLeave(event)' : ''}"
           ondrop="${isAuthorized ? `drop(event,'${col.id}')` : ''}">
        ${colTasks.length ? colTasks.map(renderCard).join('') : '<div class="col-empty">拖曳任務至此</div>'}
      </div>`;
    board.appendChild(div);
  });
}

// ─── DRAG & DROP ─────────────────────────────────────────────────────────────
function dragStart(e, id) {
  dragId = id;
  setTimeout(() => document.getElementById('card-'+id)?.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}
function dragEnd(e) {
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));
}
function dragOver(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));
  document.getElementById('col-'+colId)?.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function drop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));
  const task = tasks.find(t=>t.id===dragId);
  if (task && task.column !== colId) {
    task.column = colId;
    save();
    renderAll();
  }
  dragId = null;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id) {
  if (!isAuthorized) return; 
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '編輯任務' : '新增任務';
  if (id) {
    const t = tasks.find(t=>t.id===id);
    document.getElementById('fName').value       = t.name;
    document.getElementById('fDeadline').value   = t.deadline || '';
    
    const sel = document.getElementById('fAssignee');
    if (t.assignee && !teamMembers.includes(t.assignee)) {
      sel.innerHTML += `<option value="${t.assignee}">${t.assignee} (非團隊成員)</option>`;
    }
    sel.value                                    = t.assignee || '';
    
    document.getElementById('fColumn').value     = t.column || 'strategic';
    document.getElementById('fComplexity').value = t.complexity || 2;
    document.getElementById('fStatus').value     = t.status || '待處理';
    document.getElementById('fNotes').value      = t.notes || '';
  } else {
    document.getElementById('fName').value       = '';
    document.getElementById('fDeadline').value   = '';
    document.getElementById('fAssignee').value   = '';
    document.getElementById('fColumn').value     = 'strategic';
    document.getElementById('fComplexity').value = '2';
    document.getElementById('fStatus').value     = '待處理';
    document.getElementById('fNotes').value      = '';
  }
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null;
}

function saveTask() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('請輸入任務名稱'); return; }
  const data = {
    name,
    deadline:   document.getElementById('fDeadline').value.trim(),
    assignee:   document.getElementById('fAssignee').value.trim(),
    column:     document.getElementById('fColumn').value,
    complexity: parseInt(document.getElementById('fComplexity').value),
    status:     document.getElementById('fStatus').value,
    notes:      document.getElementById('fNotes').value.trim(),
  };
  if (editingId) {
    const idx = tasks.findIndex(t=>t.id===editingId);
    tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.push({ id: nextId++, ...data });
  }
  save();
  closeModal();
  renderAll();
}

// ─── DELETE ──────────────────────────────────────────────────────────────────
function deleteTask(id) {
  if (!isAuthorized) return;
  if (!confirm('確定刪除此任務？')) return;
  tasks = tasks.filter(t=>t.id!==id);
  save();
  renderAll();
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key==='k' && isAuthorized) { e.preventDefault(); openModal(); }
});

// ─── INIT ────────────────────────────────────────────────────────────────────
updateAuthUI();
</script>
</body>
</html>
