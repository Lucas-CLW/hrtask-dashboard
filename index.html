<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人資專案管理面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161a24;
  --bg3: #1e2335;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8b92a8;
  --text3: #545d78;
  --red: #f0524f;
  --red-bg: rgba(240,82,79,0.12);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.12);
  --yellow: #eab308;
  --blue: #4a9eff;
  --blue-bg: rgba(74,158,255,0.10);
  --teal: #2ec4a9;
  --teal-bg: rgba(46,196,169,0.10);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.10);
  --gray-bg: rgba(139,146,168,0.10);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.10);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden; /* 防止整體頁面產生多餘水平滾動軸 */
}

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 300;
  margin-top: 1px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-add {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity .15s;
}
.btn-add:hover { opacity: .85; }
.btn-add svg { width: 14px; height: 14px; }

/* FILTERS */
.filter-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 2rem;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}
.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  transition: all .15s;
  font-family: inherit;
  white-space: nowrap;
}
.pill:hover { border-color: var(--blue); color: var(--blue); }
.pill.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.filter-sep { width: 1px; height: 20px; background: var(--border); }
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text3); width: 14px; height: 14px;
}
.search-input {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px 12px 6px 32px;
  font-size: 13px; color: var(--text); font-family: inherit;
  width: 200px; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text3); }

/* STATS */
.stats-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px;
  background: var(--border); border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--bg2); padding: 16px 24px; display: flex;
  flex-direction: column; gap: 4px;
}
.stat-num { font-size: 28px; font-weight: 700; line-height: 1; font-family: 'DM Mono', monospace; }
.stat-label { font-size: 11px; color: var(--text3); font-weight: 400; text-transform: uppercase; letter-spacing: .05em; }
.stat-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

/* PROGRESS */
.progress-section { padding: 12px 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--teal)); border-radius: 3px; transition: width .5s ease; }
.progress-text { font-size: 12px; color: var(--text3); white-space: nowrap; font-family: 'DM Mono', monospace; }

/* WORKLOAD */
.workload-section { padding: 15px 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; overflow-x: auto; }
.workload-label { font-size: 11px; color: var(--text3); font-weight: 500; writing-mode: vertical-lr; text-align: center; letter-spacing: 0.2em; }
.workload-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; min-width: 150px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.wl-head { display: flex; justify-content: space-between; align-items: center; }
.wl-name { font-size: 13px; font-weight: 600; color: var(--text); }
.wl-pt { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--purple); font-weight: 700; }
.wl-bar-bg { height: 4px; background: rgba(167,139,250,0.15); border-radius: 2px; overflow: hidden; }
.wl-bar-fill { height: 100%; background: var(--purple); border-radius: 2px; transition: width 0.5s ease; }
.wl-details { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); }

/* BOARD WRAP - 修正滾動軸無法拖曳問題 */
.board-wrap {
  padding: 20px;
  overflow-x: auto;
  width: 100%; /* 使用 100% 替代 100vw，避免計算垂直滾動軸導致的溢出 */
  box-sizing: border-box;
  padding-bottom: 25px; /* 提供底部實體空間讓自訂滾動軸可以被點擊 */
}

/* 自訂水平捲軸樣式 */
.board-wrap::-webkit-scrollbar { height: 10px; }
.board-wrap::-webkit-scrollbar-track { background: var(--bg2); border-radius: 5px; }
.board-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }
.board-wrap::-webkit-scrollbar-thumb:hover { background: var(--text3); }

.board {
  display: flex;
  gap: 16px;
  min-width: fit-content;
}

/* COLUMN 面板 */
.column {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: opacity 0.2s, transform 0.2s;
  border-radius: var(--radius);
}
.column.draggable-col { cursor: grab; }
.column.dragging-col {
  opacity: 0.4;
  transform: scale(0.98);
  cursor: grabbing;
}
.column.drag-over-col {
  box-shadow: 0 0 0 2px dashed var(--blue);
}

.col-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border);
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-title { font-size: 13px; font-weight: 600; flex: 1; }
.col-count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 7px; border-radius: 10px; font-family: 'DM Mono', monospace; }

.col-body { display: flex; flex-direction: column; gap: 8px; min-height: 20px; padding: 4px 0; border-radius: var(--radius); }
.col-body.drag-over { outline: 2px dashed var(--blue); outline-offset: 4px; background: var(--blue-bg); }

/* COMPLETED ACCORDION */
.completed-toggle { font-size: 11px; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.02); border: 1px dashed var(--border); border-radius: var(--radius-sm); margin-top: 4px; transition: all .15s; }
.completed-toggle:hover { background: rgba(255,255,255,0.05); color: var(--text2); border-color: var(--text3); }
.completed-tasks-container { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; min-height: 20px; border-radius: var(--radius); }
.completed-tasks-container.drag-over { outline: 2px dashed var(--green); outline-offset: 4px; background: var(--green-bg); }

/* TASK CARD */
@keyframes pulseGlow {
  0%   { box-shadow: 0 0 0 0 rgba(245,166,35,0.5); border-color: var(--border); }
  50%  { box-shadow: 0 0 10px 1px rgba(245,166,35,0.3); border-color: var(--amber); }
  100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); border-color: var(--border); }
}

.task-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; transition: transform .15s, box-shadow .15s, border-color .15s; position: relative; overflow: hidden; }
.task-card.draggable { cursor: grab; }
.task-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,.4); transform: translateY(-1px); }
.task-card.dragging { opacity: .5; transform: rotate(2deg); cursor: grabbing; }
.task-card.nearing-deadline { animation: pulseGlow 2.5s infinite; }
.task-card.overdue-deadline { border: 1px solid var(--red); background: rgba(240,82,79,0.06); }
.task-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: var(--radius) var(--radius) 0 0; }
.task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-top: 4px; }
.task-name { font-size: 13px; font-weight: 500; line-height: 1.5; flex: 1; }
.task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.task-card:hover .task-actions { opacity: 1; }
.task-btn { width: 24px; height: 24px; border-radius: 4px; border: none; background: var(--bg3); color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.task-btn:hover { color: var(--text); background: var(--border2); }
.task-btn.del:hover { color: var(--red); }
.task-btn svg { width: 12px; height: 12px; }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .03em; }
.badge-status { border-radius: 20px; font-size: 11px; }
.task-assignee { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
.avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; }
.task-notes { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* HASHTAGS */
.task-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.task-tag { font-size: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text2); padding: 2px 6px; border-radius: 4px; }
.complexity-dots { display: flex; gap: 3px; margin-left: auto; }
.cdot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
.cdot.on { background: var(--text2); }
.task-deadline { font-family: 'DM Mono', monospace; font-size: 11px; }

/* STATUS COLORS */
.status-pending { background: var(--gray-bg); color: var(--text2); }
.status-doing   { background: var(--blue-bg); color: var(--blue); }
.status-done    { background: var(--green-bg); color: var(--green); }
.status-overdue { background: var(--red-bg); color: var(--red); }

/* URGENCY */
.urgent-red    { background: var(--red); }
.urgent-amber  { background: var(--amber); }
.urgent-yellow { background: var(--yellow); }
.urgent-blue   { background: var(--blue); }
.urgent-teal   { background: var(--teal); }
.urgent-purple { background: var(--purple); }
.deadline-red   { color: var(--red); }
.deadline-amber { color: var(--amber); }
.deadline-blue  { color: var(--blue); }
.deadline-teal  { color: var(--teal); }
.deadline-gray  { color: var(--text3); }

/* MODAL & TOAST 省略大部分樣式以簡化空間，保留原有設定 */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; width: 100%; max-width: 500px; padding: 28px; animation: slideUp .2s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; transition: color .15s; }
.modal-close:hover { color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .04em; }
.form-control { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border-color .15s; }
.form-control:focus { border-color: var(--blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { padding: 8px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: none; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s; }
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }
.btn-save { padding: 8px 18px; border-radius: var(--radius-sm); border: none; background: var(--blue); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity .15s; }
.btn-save:hover { opacity: .85; }
.col-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 20px; border: 1px dashed var(--border); border-radius: var(--radius); }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 18px; font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.4); transform: translateY(10px); opacity: 0; transition: all .2s; z-index: 500; display: flex; align-items: center; gap: 8px; }
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 768px) {
  .header { flex-direction: column; align-items: flex-start; height: auto; padding: 15px 20px; gap: 15px; }
  .header-actions { width: 100%; justify-content: space-between; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .stat-card:nth-child(1) { grid-column: span 2; }
  .filter-bar { flex-direction: column; align-items: stretch !important; padding: 15px 20px; gap: 15px; }
  .filter-bar > div { flex-direction: column; align-items: stretch !important; gap: 10px; }
  .search-wrap { width: 100%; margin-left: 0 !important; margin-top: 5px; }
  .search-wrap input.search-input { width: 100%; }
  .workload-section, .board-wrap { padding: 15px; }
  .column { width: 85vw; max-width: 320px; }
  .modal { max-height: 85vh; overflow-y: auto; padding: 20px; margin: 15px; width: 100%; }
  .form-row { grid-template-columns: 1fr; }
  .task-actions { opacity: 1; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="logo-icon">📋</div>
    <div>
      <div class="logo-title">人資專案管理面板</div>
      <div class="logo-sub">HR Project Management Dashboard</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-add" id="authBtn" style="background:var(--bg3); border:1px solid var(--border); color:var(--text);" onclick="toggleAuth()">
      🔒 唯讀模式
    </button>
    <button class="btn-add" id="addTaskBtn" style="display:none;" onclick="openModal()">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"/></svg>
      新增任務
    </button>
  </div>
</header>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="stat-num" id="statTotal" style="color:var(--text)">0</div><div class="stat-label">全部任務</div><div class="stat-bar"><div class="stat-fill" id="barTotal" style="background:var(--blue);width:100%"></div></div></div>
  <div class="stat-card"><div class="stat-num" id="statDone" style="color:var(--green)">0</div><div class="stat-label">已完成</div><div class="stat-bar"><div class="stat-fill" id="barDone" style="background:var(--green);width:0%"></div></div></div>
  <div class="stat-card"><div class="stat-num" id="statDoing" style="color:var(--blue)">0</div><div class="stat-label">進行中</div><div class="stat-bar"><div class="stat-fill" id="barDoing" style="background:var(--blue);width:0%"></div></div></div>
  <div class="stat-card"><div class="stat-num" id="statPending" style="color:var(--text2)">0</div><div class="stat-label">待處理</div><div class="stat-bar"><div class="stat-fill" id="barPending" style="background:var(--text3);width:0%"></div></div></div>
  <div class="stat-card"><div class="stat-num" id="statOverdue" style="color:var(--red)">0</div><div class="stat-label">已延宕</div><div class="stat-bar"><div class="stat-fill" id="barOverdue" style="background:var(--red);width:0%"></div></div></div>
</div>

<div class="progress-section">
  <span style="font-size:12px;color:var(--text3); white-space: nowrap;">整體進度</span>
  <div class="progress-bar-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-text" id="progressText">0 / 0</span>
</div>

<div class="workload-section" id="workloadSection"></div>

<div class="filter-bar" id="teamBar" style="display:none; border-bottom: 1px solid var(--border); background:var(--bg3); align-items: flex-start;">
  <span class="filter-label" style="color:var(--teal); margin-top: 8px;">團隊管理</span>
  <div class="filter-pills" id="teamList" style="flex: 1; margin-top: 4px;"></div>
  <div class="search-wrap" style="display:flex; align-items:center; flex-shrink: 0; margin-left: 10px;">
    <input class="search-input" style="padding-left:12px; width:120px;" type="text" id="newMemberInput" placeholder="輸入成員姓名...">
    <button class="btn-add" style="padding:4px 12px; font-size:12px; margin-left:8px;" onclick="addMember()">新增成員</button>
  </div>
</div>

<div class="filter-bar" style="display: flex; justify-content: space-between; align-items: flex-start;">
  <div style="display: flex; flex-direction: column; gap: 12px; flex: 1;">
    <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
      <span class="filter-label">狀態</span>
      <div class="filter-pills" id="statusFilters">
        <button class="pill active" data-group="status" data-val="all" onclick="setFilter('status','all',this)">全部</button>
        <button class="pill" data-group="status" data-val="待處理" onclick="setFilter('status','待處理',this)">待處理</button>
        <button class="pill" data-group="status" data-val="進行中" onclick="setFilter('status','進行中',this)">進行中</button>
        <button class="pill" data-group="status" data-val="已完成" onclick="setFilter('status','已完成',this)">已完成</button>
      </div>
      <div class="filter-sep"></div>
      <span class="filter-label">負責人</span>
      <div class="filter-pills" id="assigneeFilters">
        <button class="pill active" data-group="assignee" data-val="all" onclick="setFilter('assignee','all',this)">全部</button>
      </div>
    </div>
    <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
      <span class="filter-label">標籤</span>
      <div class="filter-pills" id="tagFilters">
        <button class="pill active" data-group="tag" data-val="all" onclick="setFilter('tag','all',this)">全部</button>
      </div>
    </div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 12px; align-items: flex-end; flex-shrink: 0; margin-left: 20px;">
    <div class="search-wrap" style="margin-left: 0;">

// ─── AUTH & TEAM ─────────────────────────────────────────────────────────────
function toggleAuth() {

    const pwd = prompt("請輸入管理員密碼：");
    if (pwd === ADMIN_PWD) isAuthorized = true;

function updateAuthUI() {

function renderTeam() {

function addMember() {

}

}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function setFilter(group, val, btn) { filters[group] = val; document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderAll(); }
function updateTagFilters() {
  const allTags = new Set();
  tasks.forEach(t => { if (t.tags && Array.isArray(t.tags)) t.tags.forEach(tag => allTags.add(tag)); });
  const tagsArray = [...allTags].sort();
  const wrap = document.getElementById('tagFilters'); const cur = filters.tag;
  let html = `<button class="pill ${cur==='all'?'active':''}" data-group="tag" data-val="all" onclick="setFilter('tag','all',this)">全部</button>`;
  tagsArray.forEach(tag => { html += `<button class="pill ${cur===tag?'active':''}" data-group="tag" data-val="${tag}" onclick="setFilter('tag','${tag}',this)">#${tag}</button>`; });
  wrap.innerHTML = html;
}
function updateAssigneeFilters() {
  const assignees = [...new Set([...teamMembers, ...tasks.map(t=>t.assignee).filter(Boolean)])].sort();
  const wrap = document.getElementById('assigneeFilters'); const cur = filters.assignee;
  wrap.innerHTML = `<button class="pill ${cur==='all'?'active':''}" data-group="assignee" data-val="all" onclick="setFilter('assignee','all',this)">全部</button>`;
  assignees.forEach(a => { wrap.innerHTML += `<button class="pill ${cur===a?'active':''}" data-group="assignee" data-val="${a}" onclick="setFilter('assignee','${a}',this)">${a}</button>`; });
}
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return tasks.filter(t => {
    if (filters.status !== 'all' && t.status !== filters.status) return false;
    if (filters.complexity !== 'all' && String(t.complexity) !== filters.complexity) return false;
    if (filters.assignee !== 'all' && t.assignee !== filters.assignee) return false;
    if (filters.tag !== 'all' && (!t.tags || !t.tags.includes(filters.tag))) return false;
    if (q) {
      const nameMatch = (t.name || '').toLowerCase().includes(q);
      const notesMatch = (t.notes || '').toLowerCase().includes(q);
      const tagsMatch = t.tags && t.tags.some(tag => tag.toLowerCase().includes(q));
      if (!nameMatch && !notesMatch && !tagsMatch) return false;
    }
    return true;
  });
}
function getSorted(tasksArray) {
  const sortType = document.getElementById('sortSelect') ? document.getElementById('sortSelect').value : 'default';
  let sorted = [...tasksArray];
  if (sortType === 'deadlineAsc') sorted.sort((a, b) => { if (!a.deadline) return 1; if (!b.deadline) return -1; return new Date(a.deadline) - new Date(b.deadline); });
  else if (sortType === 'complexityDesc') sorted.sort((a, b) => (b.complexity || 0) - (a.complexity || 0));

// ─── STATS & WORKLOAD ────────────────────────────────────────────────────────
function updateStats() {
  const total = tasks.length; const done = tasks.filter(t=>t.status==='已完成').length; const doing = tasks.filter(t=>t.status==='進行中').length; const pending = tasks.filter(t=>t.status==='待處理').length;
  let overdue = 0; const today = new Date(); today.setHours(0,0,0,0);
  tasks.forEach(t => {
    if (t.status !== '已完成' && t.deadline) {
      const taskDate = new Date(t.deadline);
      if (!isNaN(taskDate.getTime())) { taskDate.setHours(0,0,0,0); if (Math.round((taskDate - today) / 86400000) < 0) overdue++; }
    }
  });
  document.getElementById('statTotal').textContent = total; document.getElementById('statDone').textContent = done; document.getElementById('statDoing').textContent = doing; document.getElementById('statPending').textContent = pending; document.getElementById('statOverdue').textContent = overdue;
  document.getElementById('barDone').style.width = total ? (done/total*100)+'%' : '0%'; document.getElementById('barDoing').style.width = total ? (doing/total*100)+'%' : '0%'; document.getElementById('barPending').style.width = total ? (pending/total*100)+'%' : '0%'; document.getElementById('barOverdue').style.width = total ? (overdue/total*100)+'%' : '0%';
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%'; document.getElementById('progressText').textContent = `${done} / ${total} 完成`;
}
function updateWorkload() {
  const container = document.getElementById('workloadSection'); if (!container) return;
  const loadMap = { '未指派': { count: 0, complexity: 0 } }; teamMembers.forEach(m => loadMap[m] = { count: 0, complexity: 0 });
  let maxComplexity = 1;
  tasks.filter(t => t.status !== '已完成').forEach(t => {
    const assignee = (t.assignee && teamMembers.includes(t.assignee)) ? t.assignee : (t.assignee ? t.assignee : '未指派');
    if (!loadMap[assignee]) loadMap[assignee] = { count: 0, complexity: 0 };
    loadMap[assignee].count += 1; loadMap[assignee].complexity += (Number(t.complexity) || 1);
  });
  Object.keys(loadMap).forEach(k => { if (loadMap[k].complexity > maxComplexity) maxComplexity = loadMap[k].complexity; });
  let html = `<span class="workload-label">負荷評估</span>`;
  Object.keys(loadMap).forEach(m => {
    if (m === '未指派' && loadMap[m].count === 0) return;
    const data = loadMap[m]; const pct = Math.min((data.complexity / Math.max(maxComplexity, 10)) * 100, 100);
    html += `<div class="workload-card"><div class="wl-head"><span class="wl-name">${m}</span><span class="wl-pt">${data.complexity} pt</span></div><div class="wl-bar-bg"><div class="wl-bar-fill" style="width:${pct}%"></div></div><div class="wl-details"><span>未完成任務</span><span>${data.count} 件</span></div></div>`;
  });
  container.innerHTML = html;
}

function renderCard(t) {

  const actionButtons = isAuthorized ? `<div class="task-actions"><button class="task-btn" onclick="openModal(${t.id})" title="編輯"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61zm.176 4.823L9.75 4.81l-6.286 6.287a.253.253 0 0 0-.064.108l-.558 1.953 1.953-.558a.253.253 0 0 0 .108-.064zm1.238-3.763a.25.25 0 0 0-.354 0L10.811 3.65l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354z"/></svg></button><button class="task-btn del" onclick="deleteTask(${t.id})" title="刪除"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.575l-.66-6.6a.75.75 0 1 1 1.492-.15ZM6.5 1.75V3h3V1.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25Z"/></svg></button></div>` : '';
  const tagsHtml = (t.tags && t.tags.length > 0) ? `<div class="task-tags">${t.tags.map(tag => `<span class="task-tag">#${tag}</span>`).join('')}</div>` : '';

  return `<div class="task-card ${dragClass} ${cardStatusClass}" draggable="${isAuthorized ? 'true' : 'false'}" ondragstart="${isAuthorized ? `dragStart(event,${t.id})` : ''}" ondragend="${isAuthorized ? 'dragEnd(event)' : ''}" id="card-${t.id}"><div class="task-card-accent" style="background:${col?col.accent:'#555'}"></div><div class="task-top"><div class="task-name">${t.name}</div>${actionButtons}</div><div class="task-meta"><span class="badge badge-status ${statusClass(t.status)}">${t.status}</span>${t.deadline ? `<span class="task-deadline ${dlColor}">${dlText}</span>` : ''}${t.assignee ? `<span class="task-assignee"><span class="avatar" style="background:${avc}22;color:${avc}">${avTxt}</span>${t.assignee}</span>` : ''}<div class="complexity-dots">${dots}</div></div>${tagsHtml}${t.notes ? `<div class="task-notes">${t.notes}</div>` : ''}</div>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  renderTeam(); updateStats(); updateWorkload(); updateAssigneeFilters(); updateTagFilters();
  const sortedFiltered = getSorted(getFiltered()); 
  const board = document.getElementById('board'); board.innerHTML = '';
  
  columnsData.forEach(col => {
    const colTasks = sortedFiltered.filter(t=>t.column===col.id);
    const activeTasks = colTasks.filter(t=>t.status !== '已完成');
    const completedTasks = colTasks.filter(t=>t.status === '已完成');

    const div = document.createElement('div');
    div.className = 'column';
    
    // 綁定面板層級的拖曳事件 (需有管理權限)
    if (isAuthorized) {
      div.classList.add('draggable-col');
      div.draggable = true;
      div.setAttribute('ondragstart', `dragColStart(event, '${col.id}')`);
      div.setAttribute('ondragover', `dragColOver(event)`);
      div.setAttribute('ondragleave', `dragColLeave(event)`);
      div.setAttribute('ondrop', `dropCol(event, '${col.id}')`);
      div.setAttribute('ondragend', `dragColEnd(event)`);
    }

    div.innerHTML = `
      <div class="col-header"><span class="col-dot ${col.dot}"></span><span class="col-title">${col.label}</span><span class="col-count">${activeTasks.length}</span></div>
      <div class="col-body" id="col-active-${col.id}" ondragover="dragOver(event,'${col.id}')" ondragleave="dragLeave(event)" ondrop="drop(event,'${col.id}', false)">
        ${activeTasks.length ? activeTasks.map(renderCard).join('') : '<div class="col-empty">拖曳任務至此</div>'}
      </div>
      <div class="completed-toggle" onclick="toggleCompleted('${col.id}')"><span>已收納 (${completedTasks.length})</span><span id="toggle-icon-${col.id}">▼</span></div>
      <div class="completed-tasks-container" id="completed-${col.id}" style="display:none;" ondragover="dragOver(event,'${col.id}')" ondragleave="dragLeave(event)" ondrop="drop(event,'${col.id}', true)">
        ${completedTasks.length ? completedTasks.map(renderCard).join('') : '<div class="col-empty" style="padding:10px;">拖曳至此標記完成</div>'}
      </div>
    `;
    board.appendChild(div);
  });
}

function toggleCompleted(colId) {
    const container = document.getElementById('completed-' + colId); const icon = document.getElementById('toggle-icon-' + colId);
    if (container.style.display === 'none') { container.style.display = 'flex'; icon.textContent = '▲'; }
    else { container.style.display = 'none'; icon.textContent = '▼'; }
}

// ─── DRAG & DROP (任務卡片層級) ──────────────────────────────────────────────
function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset: offset, element: child }; else return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function dragStart(e, id) {
  e.stopPropagation(); // 阻斷事件冒泡，防止觸發父層(面板)的拖曳行為
  dragId = id;
  setTimeout(() => document.getElementById('card-'+id)?.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}

function dragEnd(e) {
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.col-body, .completed-tasks-container').forEach(c=>c.classList.remove('drag-over'));
  dragId = null;
}

function dragOver(e, colId) {
  if (dragColId) return; // 若正在拖曳面板，忽略任務層級的 hover 效果
  e.preventDefault();
  if (!isAuthorized || !dragId) return;
  const container = e.currentTarget; container.classList.add('drag-over');
  const sortType = document.getElementById('sortSelect').value;
  if (sortType === 'default') {
    const afterElement = getDragAfterElement(container, e.clientY);
    const draggable = document.querySelector('.dragging');
    if (draggable) { if (afterElement == null) container.appendChild(draggable); else container.insertBefore(draggable, afterElement); }
  }
}

function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function drop(e, colId, isCompletedZone) {
  e.preventDefault();
  e.stopPropagation(); // 阻斷事件冒泡，防止觸發 dropCol
  document.querySelectorAll('.col-body, .completed-tasks-container').forEach(c=>c.classList.remove('drag-over'));
  if (!isAuthorized || !dragId) return;

  const taskIndex = tasks.findIndex(t => t.id === dragId);
  if (taskIndex === -1) return;
  const task = tasks[taskIndex];

  task.column = colId;
  if (isCompletedZone) task.status = '已完成';
  else if (task.status === '已完成') task.status = '進行中';

  const sortType = document.getElementById('sortSelect').value;
  if (sortType === 'default') {
    const container = e.currentTarget; const cards = [...container.querySelectorAll('.task-card')];
    const newDomIndex = cards.findIndex(c => c.id === `card-${dragId}`);
    tasks.splice(taskIndex, 1);

    if (newDomIndex === -1 || newDomIndex === cards.length - 1) {
        let insertIndex = tasks.length;
        for(let i = tasks.length - 1; i >= 0; i--) {
            if (tasks[i].column === colId && (isCompletedZone ? tasks[i].status === '已完成' : tasks[i].status !== '已完成')) { insertIndex = i + 1; break; }
        }
        tasks.splice(insertIndex, 0, task);
    } else {
        const nextCardId = parseInt(cards[newDomIndex + 1].id.replace('card-', ''));
        const nextTaskIndex = tasks.findIndex(t => t.id === nextCardId);
        tasks.splice(nextTaskIndex !== -1 ? nextTaskIndex : tasks.length, 0, task);
    }
  }
  save(); renderAll(); dragId = null;
}

// ─── DRAG & DROP (面板欄位層級) ──────────────────────────────────────────────
function dragColStart(e, colId) {
  e.stopPropagation(); // 鎖定自身拖曳層級
  dragColId = colId;
  setTimeout(() => e.target.classList.add('dragging-col'), 0);
  e.dataTransfer.effectAllowed = 'move';
}

function dragColOver(e) {
  if (dragColId) {
    e.preventDefault(); // 必須 preventDefault 才能觸發 drop
    e.currentTarget.classList.add('drag-over-col');
  }
}

function dragColLeave(e) {
  e.currentTarget.classList.remove('drag-over-col');
}

function dropCol(e, targetColId) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over-col');
  
  if (!isAuthorized || !dragColId || dragColId === targetColId) {
    dragColId = null;
    return;
  }
  
  // 找出來源面板與目標面板在陣列中的位置，進行位置互換/插入
  const fromIdx = columnsData.findIndex(c => c.id === dragColId);
  const toIdx = columnsData.findIndex(c => c.id === targetColId);
  
  if (fromIdx > -1 && toIdx > -1) {
    const [movedCol] = columnsData.splice(fromIdx, 1);
    columnsData.splice(toIdx, 0, movedCol);
    save(); // 將更新後的面板順序寫入快取
    renderAll();
  }
  dragColId = null;
}

function dragColEnd(e) {
  document.querySelectorAll('.column').forEach(c => {
    c.classList.remove('dragging-col');
    c.classList.remove('drag-over-col');
  });
  dragColId = null;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id) {
  if (!isAuthorized) return; 
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '編輯任務' : '新增任務';
  
  // 根據當前面板順序重新生成下拉選單
  const colSelect = document.getElementById('fColumn');
  colSelect.innerHTML = columnsData.map(c => `<option value="${c.id}">${c.label}</option>`).join('');

  if (id) {
    const t = tasks.find(t=>t.id===id);
    document.getElementById('fName').value = t.name; document.getElementById('fDeadline').value = t.deadline || '';
    const sel = document.getElementById('fAssignee');
    if (t.assignee && !teamMembers.includes(t.assignee)) sel.innerHTML += `<option value="${t.assignee}">${t.assignee} (非團隊成員)</option>`;
    sel.value = t.assignee || '';
    document.getElementById('fColumn').value = t.column || columnsData[0].id;
    document.getElementById('fComplexity').value = t.complexity || 2;
    document.getElementById('fStatus').value = t.status || '待處理';
    document.getElementById('fTags').value = (t.tags && Array.isArray(t.tags)) ? t.tags.join(', ') : '';
    document.getElementById('fNotes').value = t.notes || '';
  } else {
    document.getElementById('fName').value = ''; document.getElementById('fDeadline').value = '';
    document.getElementById('fAssignee').value = ''; document.getElementById('fColumn').value = columnsData[0].id;
    document.getElementById('fComplexity').value = '2'; document.getElementById('fStatus').value = '待處理';
    document.getElementById('fTags').value = ''; document.getElementById('fNotes').value = '';
  }
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(), 100);
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); editingId = null; }

function saveTask() {
  const name = document.getElementById('fName').value.trim(); if (!name) { alert('請輸入任務名稱'); return; }
  const rawTags = document.getElementById('fTags').value; const tags = rawTags.split(',').map(s => s.trim()).filter(s => s !== '');
  const data = {
    name, deadline: document.getElementById('fDeadline').value.trim(), assignee: document.getElementById('fAssignee').value.trim(),
    column: document.getElementById('fColumn').value, complexity: parseInt(document.getElementById('fComplexity').value),
    status: document.getElementById('fStatus').value, tags: tags, notes: document.getElementById('fNotes').value.trim(),
  };
  if (editingId) { const idx = tasks.findIndex(t=>t.id===editingId); tasks[idx] = { ...tasks[idx], ...data }; }
  else { tasks.push({ id: nextId++, ...data }); }
  save(); closeModal(); renderAll();
}

// ─── DELETE & UTILS ──────────────────────────────────────────────────────────
function deleteTask(id) { if (!isAuthorized) return; if (!confirm('確定刪除此任務？')) return; tasks = tasks.filter(t=>t.id!==id); save(); renderAll(); }
let toastTimer; function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove('show'), 2200); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); if ((e.metaKey||e.ctrlKey) && e.key==='k' && isAuthorized) { e.preventDefault(); openModal(); } });

updateAuthUI();
</script>
