<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人資專案管理面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* 完全保留您原本的 CSS，無任何刪減 */
:root {
  --bg: #0f1117;
  --bg2: #161a24;
  --bg3: #1e2335;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8b92a8;
  --text3: #545d78;
  --red: #f0524f;
  --red-bg: rgba(240,82,79,0.12);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.12);
  --blue: #4a9eff;
  --blue-bg: rgba(74,158,255,0.10);
  --teal: #2ec4a9;
  --teal-bg: rgba(46,196,169,0.10);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.10);
  --gray-bg: rgba(139,146,168,0.10);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.10);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 300;
  margin-top: 1px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-add {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
}
.btn-add:hover { opacity: .85; }
.btn-add svg { width: 14px; height: 14px; }

/* FILTERS */
.filter-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 2rem;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  transition: all .15s;
  font-family: inherit;
}
.pill:hover { border-color: var(--blue); color: var(--blue); }
.pill.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.filter-sep { width: 1px; height: 20px; background: var(--border); }
.search-wrap {
  margin-left: auto;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  width: 14px; height: 14px;
}
.search-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px 6px 32px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  width: 200px;
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text3); }

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--bg2);
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  font-family: 'DM Mono', monospace;
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.stat-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .5s ease;
}

/* BOARD */
.board-wrap {
  padding: 20px;
  overflow-x: auto;
}
.board {
  display: flex;
  gap: 16px;
  min-width: fit-content;
}
.column {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.col-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-title {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
}
.col-count {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
}
.col-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 100px;
  padding: 4px 0;
}
.col-body.drag-over {
  outline: 2px dashed var(--blue);
  outline-offset: 4px;
  border-radius: var(--radius);
  background: var(--blue-bg);
}

/* TASK CARD */
.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  cursor: grab;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  position: relative;
  overflow: hidden;
}
.task-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  transform: translateY(-1px);
}
.task-card.dragging {
  opacity: .5;
  transform: rotate(2deg);
  cursor: grabbing;
}
.task-card-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.task-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-top: 4px;
}
.task-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  flex: 1;
}
.task-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
}
.task-card:hover .task-actions { opacity: 1; }
.task-btn {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: none;
  background: var(--bg3);
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.task-btn:hover { color: var(--text); background: var(--border2); }
.task-btn.del:hover { color: var(--red); }
.task-btn svg { width: 12px; height: 12px; }
.task-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .03em;
}
.badge-status { border-radius: 20px; font-size: 11px; }
.task-assignee {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text2);
}
.avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 600;
}
.task-notes {
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.complexity-dots {
  display: flex;
  gap: 3px;
  margin-left: auto;
}
.cdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border2);
}
.cdot.on { background: var(--text2); }
.task-deadline {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}

/* STATUS COLORS */
.status-pending { background: var(--gray-bg); color: var(--text2); }
.status-doing   { background: var(--blue-bg); color: var(--blue); }
.status-done    { background: var(--green-bg); color: var(--green); }
.status-overdue { background: var(--red-bg); color: var(--red); }

/* URGENCY */
.urgent-red    { background: var(--red); }
.urgent-amber  { background: var(--amber); }
.urgent-blue   { background: var(--blue); }
.urgent-teal   { background: var(--teal); }
.urgent-purple { background: var(--purple); }

.deadline-red   { color: var(--red); }
.deadline-amber { color: var(--amber); }
.deadline-blue  { color: var(--blue); }
.deadline-teal  { color: var(--teal); }
.deadline-gray  { color: var(--text3); }

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 500px;
  padding: 28px;
  animation: slideUp .2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  transition: color .15s;
}
.modal-close:hover { color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.form-control {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.form-control:focus { border-color: var(--blue); }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }
.btn-save {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
}
.btn-save:hover { opacity: .85; }

/* PROGRESS */
.progress-section {
  padding: 12px 2rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--teal));
  border-radius: 3px;
  transition: width .5s ease;
}
.progress-text {
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}

/* EMPTY */
.col-empty {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  padding: 20px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  transform: translateY(10px);
  opacity: 0;
  transition: all .2s;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { transform: translateY(0); opacity: 1; }
